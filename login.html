<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ECOM RISE — Sign In</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0d1117;
    color: #e6edf3;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  /* animated background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(56,139,253,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(56,139,253,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    z-index: 0;
  }
  body::after {
    content: '';
    position: fixed;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(ellipse at 60% 40%, rgba(31,111,235,0.08) 0%, transparent 60%),
                radial-gradient(ellipse at 30% 70%, rgba(56,139,253,0.05) 0%, transparent 50%);
    z-index: 0;
    animation: pulse 8s ease-in-out infinite alternate;
  }
  @keyframes pulse {
    from { transform: scale(1) rotate(0deg); }
    to { transform: scale(1.05) rotate(2deg); }
  }

  .login-card {
    position: relative;
    z-index: 1;
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 14px;
    padding: 40px 36px;
    width: 100%;
    max-width: 380px;
    box-shadow: 0 24px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(56,139,253,0.1);
    animation: slideUp 0.4s ease;
  }
  @keyframes slideUp {
    from { opacity:0; transform: translateY(20px); }
    to { opacity:1; transform: translateY(0); }
  }

  .brand {
    text-align: center;
    margin-bottom: 32px;
  }
  .brand-name {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .brand-name span { color: #388bfd; }
  .brand-sub {
    font-size: 11px;
    color: #484f58;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-top: 4px;
  }
  .brand-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #3fb950;
    display: inline-block;
    margin-right: 6px;
    animation: blink 2s infinite;
  }
  @keyframes blink {
    0%, 100% { opacity:1; }
    50% { opacity:0.3; }
  }

  .form-group {
    margin-bottom: 16px;
  }
  .form-group label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #8b949e;
    margin-bottom: 6px;
  }
  .form-group input {
    width: 100%;
    background: #0d1117;
    border: 1px solid #30363d;
    border-radius: 8px;
    padding: 11px 14px;
    color: #e6edf3;
    font-size: 14px;
    transition: all 0.2s;
    outline: none;
  }
  .form-group input:focus {
    border-color: #388bfd;
    box-shadow: 0 0 0 3px rgba(56,139,253,0.15);
  }
  .form-group input::placeholder { color: #484f58; }

  .login-btn {
    width: 100%;
    padding: 12px;
    background: #1f6feb;
    border: none;
    border-radius: 8px;
    color: #fff;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 8px;
    letter-spacing: 0.5px;
  }
  .login-btn:hover { background: #388bfd; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(31,111,235,0.4); }
  .login-btn:active { transform: translateY(0); }
  .login-btn.loading { opacity: 0.7; cursor: not-allowed; }

  .error-msg {
    background: rgba(248,81,73,0.1);
    border: 1px solid rgba(248,81,73,0.3);
    border-radius: 6px;
    padding: 10px 12px;
    font-size: 12px;
    color: #f85149;
    margin-top: 12px;
    display: none;
    text-align: center;
  }

  .hint {
    text-align: center;
    margin-top: 20px;
    font-size: 11px;
    color: #484f58;
  }
  .hint span { color: #3fb950; }

  .divider {
    border: none;
    border-top: 1px solid #21262d;
    margin: 24px 0;
  }

  .security-note {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: #484f58;
    justify-content: center;
  }
</style>
</head>
<body>
<div class="login-card">
  <div class="brand">
    <div class="brand-name">ECOM<span>RISE</span></div>
    <div class="brand-sub">Operations Dashboard</div>
  </div>

  <div class="form-group">
    <label>Username</label>
    <input type="text" id="username" placeholder="Enter your username" autocomplete="username" />
  </div>
  <div class="form-group">
    <label>Password</label>
    <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password"
      onkeydown="if(event.key==='Enter') tryLogin()" />
  </div>

  <button class="login-btn" onclick="tryLogin()" id="loginBtn">Sign In →</button>
  <div class="error-msg" id="errorMsg">⚠️ Incorrect username or password.</div>

  <hr class="divider">
  <div class="security-note">🔒 Private dashboard &nbsp;·&nbsp; <span>Secured</span></div>
  <div class="hint" style="margin-top:10px">To change your password, edit <code style="color:#388bfd">index.html</code></div>
</div>

<script>
  // =============================================
  // CHANGE YOUR LOGIN DETAILS HERE
  // =============================================
  const CREDENTIALS = {
    username: 'lloyd',       // ← change this
    password: 'ecom2026'     // ← change this
  };
  // =============================================

  function tryLogin() {
    const u = document.getElementById('username').value.trim();
    const p = document.getElementById('password').value;
    const btn = document.getElementById('loginBtn');
    const err = document.getElementById('errorMsg');

    btn.classList.add('loading');
    btn.textContent = 'Signing in...';
    err.style.display = 'none';

    // Small delay for UX feel
    setTimeout(() => {
      if (u === CREDENTIALS.username && p === CREDENTIALS.password) {
        // Store session
        sessionStorage.setItem('ecr_auth', btoa(u + ':' + Date.now()));
        window.location.href = 'dashboard.html';
      } else {
        btn.classList.remove('loading');
        btn.textContent = 'Sign In →';
        err.style.display = 'block';
        document.getElementById('password').value = '';
        document.getElementById('password').focus();
        // Shake animation
        const card = document.querySelector('.login-card');
        card.style.animation = 'none';
        card.offsetHeight;
        card.style.animation = 'shake 0.4s ease';
      }
    }, 600);
  }

  // Auto-focus
  document.getElementById('username').focus();

  // Add shake keyframes dynamically
  const style = document.createElement('style');
  style.textContent = `@keyframes shake {
    0%,100%{transform:translateX(0)}
    20%{transform:translateX(-8px)}
    40%{transform:translateX(8px)}
    60%{transform:translateX(-5px)}
    80%{transform:translateX(5px)}
  }`;
  document.head.appendChild(style);
</script>
</body>
</html>
